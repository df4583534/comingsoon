<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Partner Cloud</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f5f4f0;
      font-family: 'DM Sans', sans-serif;
      color: #1a1a1a;
    }

    .wrap {
      text-align: center;
      padding: 2rem;
      animation: up 1s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 4rem;
    }

    .logo svg {
      width: 32px;
      height: 32px;
    }

    .logo-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #1a1a1a;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      line-height: 1;
      letter-spacing: -0.03em;
      color: #1a1a1a;
      margin-bottom: 1.5rem;
    }

    p {
      font-size: 1rem;
      font-weight: 300;
      color: #888;
      letter-spacing: 0.02em;
    }

    footer {
      position: fixed;
      bottom: 2rem;
      font-size: 0.72rem;
      color: #bbb;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="logo">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 22c0-4 2.8-7.5 6.8-8.8A8 8 0 0 1 27 18c0 .3 0 .6-.04 1A5 5 0 0 1 24.5 27H7.5A5 5 0 0 1 5 22z" fill="#1a1a1a"/>
      </svg>
      <span class="logo-name">Partner Cloud</span>
    </div>

    <h1>Coming<br/>Soon.</h1>
    <p>Something is on the way.</p>
  </div>

  <footer>&copy; 2026 Partner Cloud</footer>

</body>
</html>
